<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Inserir Técnico</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f9f9f9;
        }
        form {
            max-width: 400px;
            margin: auto;
            padding: 20px;
            background-color: #ffffff;
            border-radius: 5px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }
        label, input, textarea, button {
            display: block;
            width: 100%;
            margin-bottom: 10px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #45a049;
        }
    </style>
</head>
<body>
    <h1>Inserir Novo Técnico</h1>
    <form method="POST" action="{{ url_for('inserir_tecnico') }}">
        <label for="nome">Nome do Técnico:</label>
        <input type="text" name="nome" id="nome" placeholder="Insira o nome completo" required>

        <label for="email">Email:</label>
        <input type="email" name="email" id="email" placeholder="Insira o email" required>

        <label for="telefone">Telefone:</label>
        <input type="text" name="telefone" id="telefone" placeholder="(XX) XXXXX-XXXX" required>

        <label for="setor">Setor:</label>
        <input type="text" name="setor" id="setor" placeholder="Informe o setor" required>
        
        <button type="submit">Salvar</button>
    </form>
</body>
</html>
