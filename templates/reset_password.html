<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <!-- Metadados e estilos semelhantes ao login -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Senha - Agro Indústria Polpa de Fruta LTDA</title>
    <!-- Estilos e fontes -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
    <style>
        /* Reutilize o estilo da página de login */
        /* ... (mesmo estilo da página de login) ... */
    </style>
</head>
<body>
    <div class="container">
        <h2>Redefinir Senha</h2>
        <!-- Mensagem de erro ou sucesso -->
        {% if message %}
            <p class="error">{{ message }}</p>
        {% endif %}

        <!-- Formulário de Redefinição -->
        <form action="/reset_password" method="post" onsubmit="showLoading()">
            <input type="email" name="email" placeholder="Email cadastrado" required aria-label="Email cadastrado">
            <!-- Botão de envio -->
            <input type="submit" value="Enviar Instruções">
            <!-- Feedback visual de carregamento -->
            <p class="loading" id="loading">Processando...</p>
        </form>

        <!-- Link para o login -->
        <div class="links">
            <a href="/login">Voltar ao login</a>
        </div>
    </div>

    <!-- Script JavaScript -->
    <script>
        function showLoading() {
            document.getElementById("loading").style.display = "block";
        }
    </script>
</body>
</html>
